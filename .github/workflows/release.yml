name: Release

# Push a semver tag to build installers and publish a draft GitHub release:
#   git tag v0.1.0 && git push origin v0.1.0
on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    name: bundle (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest # Apple Silicon; add macos-13 for Intel if needed
            args: ""
          - os: ubuntu-22.04 # build AppImage on older glibc for portability
            args: ""
          - os: windows-latest
            args: ""
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            build-essential \
            curl wget file \
            libssl-dev \
            libxdo-dev

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend deps
        run: npm ci

      - name: Build & publish (draft release)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # macOS code signing + notarization. If these secrets are unset the
          # build still succeeds, producing an unsigned app. Set them in
          # Settings → Secrets and variables → Actions to enable signing.
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "ZIMD ${{ github.ref_name }}"
          releaseBody: |
            Download the installer for your platform from the assets below.

            **macOS** — `.dmg` · **Windows** — `.msi` / `.exe` · **Linux** — `.AppImage` / `.deb` / `.rpm`

            > These builds are currently **unsigned**, so the OS may warn on first launch:
            > - **macOS**: right-click the app → **Open**, then confirm (or System Settings → Privacy & Security → Open Anyway).
            > - **Windows**: on the SmartScreen prompt, click **More info → Run anyway**.
            > Signed & notarized builds are planned for a future release.
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
